name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build - ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: prune
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: prune
            archive: tar.gz
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}
    
    - name: Build release
      run: cargo build --release --target ${{ matrix.target }}

    - name: Create archive
      run: |
        mkdir -p release
        cp target/${{ matrix.target }}/release/${{ matrix.binary }} release/
        cp README.md LICENSE release/ 2>/dev/null || true
        cd release && tar -czf ../prune-${{ matrix.target }}.${{ matrix.archive }} *

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: prune-${{ matrix.target }}
        path: prune-${{ matrix.target }}.${{ matrix.archive }}

    - name: Generate checksum
      run: |
        shasum -a 256 prune-${{ matrix.target }}.${{ matrix.archive }} > prune-${{ matrix.target }}.${{ matrix.archive }}.sha256
    
    - name: Upload checksum
      uses: actions/upload-artifact@v4
      with:
        name: prune-${{ matrix.target }}-checksum
        path: prune-${{ matrix.target }}.${{ matrix.archive }}.sha256

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
    
    - name: Prepare release assets
      run: |
        mkdir -p release-assets
        find artifacts -name "*.tar.gz" -o -name "*.zip" | grep -v checksum | xargs -I {} cp {} release-assets/
        find artifacts -name "*.sha256" | xargs -I {} cp {} release-assets/
        ls -la release-assets/
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          release-assets/*
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  homebrew:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-latest
    
    steps:
    - name: Extract version
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
    
    - name: Get checksums
      id: checksums
      run: |
        # Download release assets to get checksums
        curl -sL https://github.com/gabrielemastrapasqua/prune/releases/download/v${{ steps.version.outputs.VERSION }}/prune-x86_64-apple-darwin.tar.gz.sha256 > macos_x86.sha256
        curl -sL https://github.com/gabrielemastrapasqua/prune/releases/download/v${{ steps.version.outputs.VERSION }}/prune-aarch64-apple-darwin.tar.gz.sha256 > macos_arm.sha256
        
        MACOS_X86_SHA=$(cut -d' ' -f1 macos_x86.sha256)
        MACOS_ARM_SHA=$(cut -d' ' -f1 macos_arm.sha256)
        
        echo "macos_x86_sha=$MACOS_X86_SHA" >> $GITHUB_OUTPUT
        echo "macos_arm_sha=$MACOS_ARM_SHA" >> $GITHUB_OUTPUT
    
    - name: Checkout homebrew-tap
      uses: actions/checkout@v4
      with:
        repository: gabrielemastrapasqua/homebrew-tap
        token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        path: homebrew-tap
    
    - name: Update formula
      run: |
        cat > homebrew-tap/Formula/prune.rb << EOF
        class Prune < Formula
          desc "Interactive TUI disk cleanup advisor with intelligent analysis"
          homepage "https://github.com/gabrielemastrapasqua/prune"
          version "${{ steps.version.outputs.VERSION }}"
          license "Apache-2.0"
        
          on_macos do
            if Hardware::CPU.intel?
              url "https://github.com/gabrielemastrapasqua/prune/releases/download/v${{ steps.version.outputs.VERSION }}/prune-x86_64-apple-darwin.tar.gz"
              sha256 "${{ steps.checksums.outputs.macos_x86_sha }}"
            else
              url "https://github.com/gabrielemastrapasqua/prune/releases/download/v${{ steps.version.outputs.VERSION }}/prune-aarch64-apple-darwin.tar.gz"
              sha256 "${{ steps.checksums.outputs.macos_arm_sha }}"
            end
          end
        
          def install
            bin.install "prune"
          end
        
          test do
            system "#{bin}/prune", "--version"
          end
        end
        EOF
    
    - name: Commit and push to homebrew-tap
      run: |
        cd homebrew-tap
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add Formula/prune.rb
        git commit -m "Update prune to v${{ steps.version.outputs.VERSION }}" || exit 0
        git push
